{{- $image := .Get 0 -}}
{{- $alt := .Get 1 -}}
{{- $src := $image -}}
{{- if not (or (strings.HasPrefix $src "http://") (strings.HasPrefix $src "https://")) -}}
	{{- $src = strings.TrimPrefix "/" $src -}}
	{{- $src = $src | relURL -}}
{{- end -}}
<img src="{{ $src }}" alt="{{ $alt }}" class="img-responsive">
