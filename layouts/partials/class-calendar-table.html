{{ $calendar := .calendar }}
<div class="calendar-wrap">
  <table class="class-calendar-table">
    <thead>
      <tr>
        {{ range $calendar.table.headers }}
          <th>{{ . }}</th>
        {{ end }}
      </tr>
    </thead>
    <tbody>
      {{ range $calendar.table.rows }}
        <tr>
          <th>{{ .day }}</th>
          {{ range .slots }}
            <td>{{ . }}</td>
          {{ end }}
        </tr>
      {{ end }}
    </tbody>
  </table>
</div>
