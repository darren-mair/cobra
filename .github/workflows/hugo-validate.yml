name: Validate Hugo Builds

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hugo_version: ["0.147.7", "0.160.1"]
        base_url:
          - "https://cobraboxingandfitness.com/"
          - "https://darren-mair.github.io/cobra/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ matrix.hugo_version }}
          extended: true

      - name: Build
        run: hugo --gc --minify --baseURL "${{ matrix.base_url }}"
