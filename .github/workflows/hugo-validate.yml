name: Validate Hugo Builds

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base_url:
          - "https://cobraboxingandfitness.com/"
          - "https://darren-mair.github.io/cobra/"

    env:
      HUGO_VERSION: "0.160.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Generate fallback Google reviews payload
        run: python3 scripts/fetch_google_reviews.py --output data/google_reviews.json --max-reviews 6

      - name: Build
        run: hugo --gc --minify --baseURL "${{ matrix.base_url }}"
