name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 0.160.1
          extended: true

      - name: Fetch Google reviews data
        run: python3 scripts/fetch_google_reviews.py --output data/google_reviews.json --max-reviews 20
        env:
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: Validate Google reviews payload
        run: |
          python3 - <<'PY'
          import json
          import sys

          with open("data/google_reviews.json", "r", encoding="utf-8") as f:
              payload = json.load(f)

          if not payload.get("ok"):
              print(f"Google reviews payload invalid: {payload.get('reason', 'unknown_reason')}")
              sys.exit(1)

          print(f"Google reviews payload valid with {len(payload.get('reviews', []))} reviews")
          PY

      - name: Commit refreshed Google reviews data
        run: |
          if git diff --quiet -- data/google_reviews.json; then
            echo "No Google reviews data changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/google_reviews.json
          git commit -m "chore(data): refresh Google reviews [skip ci]"
          git push

      - name: Fetch Facebook posts into News
        run: python3 scripts/fetch_facebook_news.py --output-dir content/news --max-posts 5
        env:
          FB_PAGE_USERNAME: ${{ secrets.FB_PAGE_USERNAME }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: hugo --gc --minify --baseURL "https://cobraboxingandfitness.com/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
