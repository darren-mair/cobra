name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 0.160.1
          extended: true

      - name: Fetch Google reviews data
        run: python3 scripts/fetch_google_reviews.py --output data/google_reviews.json --max-reviews 20
        env:
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: Validate Google reviews payload
        run: |
          python3 - <<'PY'
          import json
          import sys

          with open("data/google_reviews.json", "r", encoding="utf-8") as f:
              payload = json.load(f)

          if not payload.get("ok"):
              print(f"Google reviews payload invalid: {payload.get('reason', 'unknown_reason')}")
              sys.exit(1)

          print(f"Google reviews payload valid with {len(payload.get('reviews', []))} reviews")
          PY

      - name: Detect newly imported Google reviews
        id: google_reviews_delta
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          def review_key(review):
              return (
                  review.get("time") or 0,
                  (review.get("author_name") or "").strip(),
                  (review.get("text") or "").strip(),
              )

          def get_reviews_from_path(path):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      payload = json.load(f)
              except Exception:
                  return []
              reviews = payload.get("reviews", []) if isinstance(payload, dict) else []
              return [r for r in reviews if isinstance(r, dict)]

          def get_reviews_from_head(path):
              try:
                  content = subprocess.check_output(
                      ["git", "show", f"HEAD:{path}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
                  payload = json.loads(content)
              except Exception:
                  return []
              reviews = payload.get("reviews", []) if isinstance(payload, dict) else []
              return [r for r in reviews if isinstance(r, dict)]

          current = get_reviews_from_path("data/google_reviews.json")
          previous = get_reviews_from_head("data/google_reviews.json")

          current_keys = {review_key(r) for r in current}
          previous_keys = {review_key(r) for r in previous}
          new_count = len(current_keys - previous_keys)
          has_new = new_count > 0

          print(f"Detected {new_count} newly imported Google reviews")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"new_count={new_count}\n")
              out.write(f"has_new={'true' if has_new else 'false'}\n")
          PY

      - name: Commit refreshed Google reviews data
        if: steps.google_reviews_delta.outputs.has_new == 'true'
        run: |
          git add data/google_reviews.json

          if git diff --cached --quiet -- data/google_reviews.json; then
            echo "No Google reviews data changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): refresh Google reviews [skip ci]"
          git push

      - name: Skip Google reviews commit (no new imports)
        if: steps.google_reviews_delta.outputs.has_new != 'true'
        run: echo "No new Google reviews imported; skipping commit."

      - name: Fetch Facebook posts into News (Apify dataset)
        run: |
          pwsh -File scripts/fetch-apify-facebook-posts.ps1 \
            -OutputDir content/news \
            -ImageDir static/img/posters \
            -ChampsImageDir static/img/cobra-champs \
            -PostsJsonOut data/facebook_posts.json \
            -MaxPosts 50
        env:
          FB_PAGE_URL: ${{ secrets.FB_PAGE_URL }}
          APIFY_DATASET_ITEMS_URL: ${{ secrets.APIFY_DATASET_ITEMS_URL }}
          APIFY_TASK_ID: ${{ secrets.APIFY_TASK_ID }}
          APIFY_DATASET_ID: ${{ secrets.APIFY_DATASET_ID }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

      - name: Detect newly imported Facebook posts
        id: facebook_posts_delta
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          def get_posts_from_path(path):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      payload = json.load(f)
              except Exception:
                  return []
              posts = payload.get("posts", []) if isinstance(payload, dict) else []
              return [p for p in posts if isinstance(p, dict)]

          def get_posts_from_head(path):
              try:
                  content = subprocess.check_output(
                      ["git", "show", f"HEAD:{path}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
                  payload = json.loads(content)
              except Exception:
                  return []
              posts = payload.get("posts", []) if isinstance(payload, dict) else []
              return [p for p in posts if isinstance(p, dict)]

          current = get_posts_from_path("data/facebook_posts.json")
          previous = get_posts_from_head("data/facebook_posts.json")

          current_ids = {str(p.get("id", "")).strip() for p in current if str(p.get("id", "")).strip()}
          previous_ids = {str(p.get("id", "")).strip() for p in previous if str(p.get("id", "")).strip()}
          new_count = len(current_ids - previous_ids)
          status_output = subprocess.check_output(
              [
                  "git",
                  "status",
                  "--porcelain",
                  "--",
                  "data/facebook_posts.json",
                  "content/news",
                  "static/img/posters",
                  "static/img/cobra-champs",
              ],
              text=True,
          )
          content_changed = bool(status_output.strip())
          has_changes = new_count > 0 or content_changed

          print(f"Detected {new_count} newly imported Facebook posts")
          print(f"Detected generated Facebook content changes: {content_changed}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"new_count={new_count}\n")
              out.write(f"content_changed={'true' if content_changed else 'false'}\n")
              out.write(f"has_changes={'true' if has_changes else 'false'}\n")
          PY

      - name: Commit refreshed Facebook news data
        if: steps.facebook_posts_delta.outputs.has_changes == 'true'
        run: |
          git add -A content/news static/img/posters static/img/cobra-champs
          git add -f data/facebook_posts.json

          if git diff --cached --quiet -- data/facebook_posts.json content/news static/img/posters static/img/cobra-champs; then
            echo "No Facebook news changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): refresh Facebook news posts [skip ci]"
          git push

      - name: Skip Facebook commit (no new imports)
        if: steps.facebook_posts_delta.outputs.has_changes != 'true'
        run: echo "No Facebook news changes detected; skipping commit."

      - name: Sync OneDrive gallery images
        run: python3 scripts/sync_onedrive_gallery.py --output-dir static/img/gallery
        env:
          ONEDRIVE_FOLDER_SHARE_URL: ${{ secrets.ONEDRIVE_FOLDER_SHARE_URL }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: hugo --gc --minify --baseURL "https://cobraboxingandfitness.com/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
